name: Rebrand to Mikodctl

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  rebrand:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Rebrand mikodctl to mikodctl
        run: |
          echo "🏷️ Rebranding: mikodctl → mikodctl"
          
          # Binary adını değiştir (Makefile)
          if [ -f "Makefile" ]; then
            sed -i 's/mikodctl/mikodctl/g' Makefile
            echo "✅ Makefile güncellendi"
          fi
          
          # Go modül adını güncelle
          if [ -f "go.mod" ]; then
            sed -i 's|github.com/localfont/mikodctl|github.com/localfont/mikodctl|g' go.mod
            echo "✅ go.mod güncellendi"
          fi
          
          # Tüm Go dosyalarındaki importları güncelle
          find . -name "*.go" -type f -exec sed -i 's|github.com/localfont/mikodctl|github.com/localfont/mikodctl|g' {} \;
          echo "✅ Go importları güncellendi"
          
          # Komut isimleri ve açıklamaları
          find . -name "*.go" -type f -exec sed -i 's/"mikodctl"/"mikodctl"/g' {} \;
          find . -name "*.go" -type f -exec sed -i 's/mikodctl /mikodctl /g' {} \;
          echo "✅ Komut referansları güncellendi"
          
          # README ve dokümantasyon
          find . -name "*.md" -type f -exec sed -i 's/mikodctl/mikodctl/g' {} \;
          find . -name "*.md" -type f -exec sed -i 's/Nerdctl/Mikodctl/g' {} \;
          find . -name "*.md" -type f -exec sed -i 's/NERDCTL/MIKODCTL/g' {} \;
          echo "✅ Markdown dosyaları güncellendi"
          
          # Docker/Dockerfile referansları
          find . -name "Dockerfile*" -type f -exec sed -i 's/mikodctl/mikodctl/g' {} \;
          find . -name "docker-compose*" -type f -exec sed -i 's/mikodctl/mikodctl/g' {} \;
          echo "✅ Docker dosyaları güncellendi"
          
          # YAML ve script dosyaları
          find . -name "*.yaml" -o -name "*.yml" -o -name "*.sh" | xargs -I {} sed -i 's/mikodctl/mikodctl/g' {} 2>/dev/null || true
          echo "✅ YAML/Script dosyaları güncellendi"

      - name: Check for changes
        id: check_changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git add -A
          git commit -m "chore: rebrand mikodctl to mikodctl [skip ci]"
          git push origin HEAD:${{ github.ref_name }}
          echo "✅ Değişiklikler commit edildi ve pushlandı"

      - name: No changes
        if: steps.check_changes.outputs.has_changes == 'false'
        run: echo "ℹ️ Değişiklik yok, atlanıyor"
        
